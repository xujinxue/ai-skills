interface:
  display_name: "DeepPaperNote"
  short_description: "Generate a high-quality deep-reading note for one paper with an evidence-first workflow and Obsidian-oriented save semantics."
  default_prompt: "Use $DeepPaperNote when the user wants to turn a single paper into a high-quality Markdown deep-reading note. Follow the bundled DeepPaperNote workflow to resolve the paper, gather evidence, plan figure and table placeholders, write the final Chinese note, run lint plus final readability review, and save it into the configured Obsidian-style vault or the workspace fallback when no vault is configured."

policy:
  allow_implicit_invocation: true
